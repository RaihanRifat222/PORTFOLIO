- question: "Did you always want to work in AI?"
  answer: "I have been curious about programming since my teenage years. When I began my Bachelor's in Computer Science, that curiosity became more focused. In my final year, I worked on a thesis involving Bengali Optical Character Recognition using YOLO, which required deep research in computer vision and NLP. That experience shifted my interest toward AI and machine learning. Seeing the rapid global growth of AI further motivated me to pursue a Master’s in Artificial Intelligence and deepen my expertise."
  tags: ["motivation", "ai-journey"]

